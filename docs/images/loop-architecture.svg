<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Agentic loop architecture</title>
  <desc id="desc">An issue enters a bounded planning, implementation, verification and review loop before a pull request is opened.</desc>
  <defs>
    <style>
      .bg{fill:#0b1220}.panel{fill:#111c30;stroke:#334866;stroke-width:2}.accent{fill:#1f9d8a}.warn{fill:#d99a3e}.text{fill:#e8eef8;font:20px Arial,sans-serif}.small{fill:#aab9cf;font:16px Arial,sans-serif}.title{fill:#fff;font:bold 34px Arial,sans-serif}.arrow{stroke:#65c4b8;stroke-width:4;fill:none;marker-end:url(#head)}
    </style>
    <marker id="head" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#65c4b8"/></marker>
  </defs>
  <rect class="bg" width="1200" height="620" rx="24"/>
  <text class="title" x="60" y="65">A bounded repository loop</text>
  <rect class="panel" x="55" y="120" width="180" height="110" rx="16"/>
  <text class="text" x="82" y="165">Intent intake</text><text class="small" x="74" y="198">Git · Jira · local</text>
  <rect class="panel" x="300" y="120" width="180" height="110" rx="16"/>
  <text class="text" x="332" y="165">OpenSpec</text><text class="small" x="322" y="198">proposal + specs</text>
  <rect class="panel" x="545" y="120" width="180" height="110" rx="16"/>
  <text class="text" x="575" y="165">Implement</text><text class="small" x="575" y="198">working tree</text>
  <rect class="panel" x="790" y="120" width="180" height="110" rx="16"/>
  <text class="text" x="833" y="165">Verify</text><text class="small" x="820" y="198">tests + policy</text>
  <rect class="panel" x="790" y="330" width="180" height="110" rx="16"/>
  <text class="text" x="831" y="375">Review</text><text class="small" x="819" y="408">independent pass</text>
  <rect class="panel" x="1015" y="330" width="140" height="110" rx="16"/>
  <text class="text" x="1054" y="375">PR / MR</text><text class="small" x="1036" y="408">human merge</text>
  <path class="arrow" d="M235 175 H295"/><path class="arrow" d="M480 175 H540"/><path class="arrow" d="M725 175 H785"/>
  <path class="arrow" d="M880 230 V325"/><path class="arrow" d="M970 385 H1010"/>
  <path class="arrow" d="M790 190 C735 285 700 310 635 235"/>
  <text class="small" x="650" y="286">bounded retry</text>
  <rect x="55" y="500" width="1100" height="70" rx="14" fill="#14263c"/>
  <circle class="accent" cx="95" cy="535" r="11"/><text class="small" x="120" y="542">state</text>
  <circle class="accent" cx="240" cy="535" r="11"/><text class="small" x="265" y="542">trace</text>
  <circle class="accent" cx="385" cy="535" r="11"/><text class="small" x="410" y="542">cost</text>
  <circle class="accent" cx="530" cy="535" r="11"/><text class="small" x="555" y="542">latency</text>
  <circle class="warn" cx="700" cy="535" r="11"/><text class="small" x="725" y="542">blocked actions</text>
  <circle class="warn" cx="930" cy="535" r="11"/><text class="small" x="955" y="542">human gates</text>
</svg>
