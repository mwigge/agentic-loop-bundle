<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Loop observability flow</title>
  <desc id="desc">Loop stages emit GenAI OpenTelemetry spans to JSONL, SigNoz, AgentOps, or another OTLP backend.</desc>
  <defs>
    <style>.bg{fill:#f4f7fb}.box{fill:#fff;stroke:#5b718d;stroke-width:2}.dark{fill:#15243a}.title{font:bold 32px Arial,sans-serif;fill:#15243a}.label{font:bold 20px Arial,sans-serif;fill:#15243a}.light{font:17px Arial,sans-serif;fill:#52667f}.white{font:bold 20px Arial,sans-serif;fill:#fff}.line{stroke:#168c82;stroke-width:4;fill:none;marker-end:url(#a)}</style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#168c82"/></marker>
  </defs>
  <rect class="bg" width="1200" height="560" rx="22"/>
  <text class="title" x="55" y="65">See the whole run, not just the final diff</text>
  <rect class="dark" x="55" y="120" width="250" height="300" rx="18"/>
  <text class="white" x="95" y="165">loop.run</text>
  <text class="white" x="95" y="215">├ loop.propose</text>
  <text class="white" x="95" y="265">├ loop.slice</text>
  <text class="white" x="95" y="315">├ loop.verify</text>
  <text class="white" x="95" y="365">└ loop.review</text>
  <path class="line" d="M305 270 H445"/>
  <rect class="box" x="450" y="145" width="290" height="250" rx="18"/>
  <text class="label" x="500" y="190">OpenTelemetry</text>
  <text class="light" x="490" y="230">GenAI semantic attributes</text>
  <text class="light" x="490" y="270">W3C trace correlation</text>
  <text class="light" x="490" y="310">tokens, cost, latency</text>
  <text class="light" x="490" y="350">tasks, errors, retries</text>
  <path class="line" d="M740 215 H865"/><path class="line" d="M740 325 H865"/>
  <rect class="box" x="870" y="110" width="275" height="150" rx="18"/>
  <text class="label" x="960" y="155">Local</text>
  <text class="light" x="915" y="195">JSONL run evidence</text>
  <text class="light" x="915" y="225">works without a backend</text>
  <rect class="box" x="870" y="300" width="275" height="150" rx="18"/>
  <text class="label" x="945" y="345">Exporters</text>
  <text class="light" x="915" y="385">SigNoz · AgentOps</text>
  <text class="light" x="915" y="415">any OTLP backend</text>
</svg>
