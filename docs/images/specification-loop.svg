<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">OpenSpec-centered agent loops</title>
  <desc id="desc">A root proposal contains specifications, design and tasks; larger tasks can create linked specification subloops.</desc>
  <defs>
    <style>.bg{fill:#0d1726}.box{fill:#14263d;stroke:#46617f;stroke-width:2}.spec{fill:#143b3a;stroke:#42b6a7;stroke-width:3}.t{fill:#fff;font:bold 25px Arial}.s{fill:#b9c8da;font:18px Arial}.a{stroke:#62c8bb;stroke-width:4;fill:none;marker-end:url(#h)}.dash{stroke:#d7a14c;stroke-width:3;stroke-dasharray:10 8;fill:none;marker-end:url(#w)}</style>
    <marker id="h" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#62c8bb"/></marker>
    <marker id="w" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#d7a14c"/></marker>
  </defs>
  <rect class="bg" width="1200" height="560" rx="22"/>
  <text class="t" x="55" y="62">The specification is the durable center of the loop</text>
  <rect class="box" x="55" y="130" width="190" height="110" rx="15"/><text class="t" x="103" y="175">Intent</text><text class="s" x="84" y="210">Git · Jira · local</text>
  <rect class="spec" x="325" y="90" width="355" height="310" rx="18"/>
  <text class="t" x="385" y="140">OpenSpec change</text>
  <text class="s" x="385" y="195">proposal.md</text><text class="s" x="385" y="235">specs/*/spec.md</text><text class="s" x="385" y="275">design.md</text><text class="s" x="385" y="315">tasks.md</text><text class="s" x="385" y="365">validation + task state</text>
  <rect class="box" x="770" y="105" width="360" height="120" rx="15"/><text class="t" x="825" y="153">Implementation loop</text><text class="s" x="820" y="190">implement · verify · review</text>
  <rect class="box" x="770" y="310" width="360" height="120" rx="15"/><text class="t" x="835" y="358">Specification subloop</text><text class="s" x="815" y="395">child change linked to parent</text>
  <path class="a" d="M245 185 H320"/><path class="a" d="M680 165 H765"/>
  <path class="dash" d="M680 335 H765"/><path class="dash" d="M950 310 C950 260 875 260 875 225"/>
  <text class="s" x="55" y="500">GitHub, GitLab, Jira, and local commands move evidence around one checked-in specification.</text>
</svg>
